<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đặt hàng</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --bg-1: #eef5ff;
            --bg-2: #dbe9ff;
            --ink-900: #172845;
            --ink-700: #3d5276;
            --line: #d6e0f0;
            --primary: #236bd0;
            --price: #0d8f72;
            --danger: #cc3f4e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 48%, #f8fbff 100%);
            color: var(--ink-900);
            min-height: 100vh;
        }
        .navbar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(16, 36, 68, 0.88);
            color: white;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }
        .brand { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; }
        .navbar ul { list-style: none; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .navbar a { color: #f2f7ff; text-decoration: none; font-weight: 700; font-size: 14px; }
        .nav-chip {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            padding: 6px 12px;
        }
        .container {
            max-width: 1100px;
            margin: 26px auto;
            background: rgba(255, 255, 255, 0.96);
            padding: 24px;
            border-radius: 18px;
            border: 1px solid #e4ecfa;
            box-shadow: 0 16px 35px rgba(24, 52, 96, 0.12);
        }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 32px; margin-bottom: 8px; }
        .sub { color: var(--ink-700); margin-bottom: 16px; }
        .alert {
            background: #fdebec;
            color: #9f2430;
            border: 1px solid #f4c8cd;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 12px;
        }
        .table-wrap { border: 1px solid #e2eaf8; border-radius: 14px; overflow: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #edf2fb; text-align: left; }
        th { background: #f8fbff; font-size: 12px; text-transform: uppercase; color: var(--ink-700); }
        .price { color: var(--price); font-weight: 800; font-family: 'Space Grotesk', sans-serif; }
        .btn-detail {
            text-decoration: none;
            color: white;
            background: linear-gradient(90deg, var(--primary) 0%, #3078dd 100%);
            border-radius: 8px;
            padding: 7px 11px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
        }
        .empty { text-align: center; color: #6c7f9f; padding: 30px; border: 1px dashed #c9d6ec; border-radius: 12px; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="brand">Lịch sử đặt hàng</div>
    <ul>
        <li><a class="nav-chip" th:href="@{/products}">Sản phẩm</a></li>
        <li><a class="nav-chip" th:href="@{/cart}">Giỏ hàng <span th:if="${cartCount != null and cartCount > 0}" th:text="${cartCount}">0</span></a></li>
        <li><a class="nav-chip" th:href="@{/orders}">Đơn hàng</a></li>
    </ul>
</nav>

<div class="container">
    <h1>Đơn hàng của bạn</h1>
    <p class="sub">Theo dõi lịch sử mua hàng theo thời gian.</p>

    <div class="alert" th:if="${error}" th:text="${error}"></div>

    <div class="table-wrap" th:if="${orders != null and !orders.isEmpty()}">
        <table>
            <thead>
            <tr>
                <th>Mã đơn</th>
                <th>Thời gian</th>
                <th>Số món</th>
                <th>Tổng tiền</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="o : ${orders}">
                <td th:text="${o.id}">1</td>
                <td th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm')}">00/00/0000 00:00</td>
                <td th:text="${o.details.size()}">0</td>
                <td class="price" th:text="${#numbers.formatDecimal(o.totalAmount, 1, 0)} + ' đ'">0 đ</td>
                <td><a class="btn-detail" th:href="@{/orders/{id}(id=${o.id})}">Xem chi tiết</a></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="empty" th:if="${orders == null or orders.isEmpty()}">
        Bạn chưa có đơn hàng nào. <a th:href="@{/products}">Mua sắm ngay</a>
    </div>
</div>
</body>
</html>
