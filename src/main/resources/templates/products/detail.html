<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name}">Chi tiết sản phẩm</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --bg-1: #eef5ff;
            --bg-2: #dbe9ff;
            --ink-900: #172845;
            --ink-700: #3d5276;
            --line: #d6e0f0;
            --primary: #236bd0;
            --teal: #0c8d71;
            --price: #0d8f72;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background:
                radial-gradient(72rem 48rem at -8% 0%, #f8fbff 0%, transparent 55%),
                radial-gradient(65rem 42rem at 108% 10%, #dce9ff 0%, transparent 58%),
                linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 48%, #f8fbff 100%);
            color: var(--ink-900);
            min-height: 100vh;
        }
        .navbar {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(7px);
            background: rgba(16, 36, 68, 0.88);
            color: white;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }
        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            letter-spacing: -0.02em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(180deg, #59b2ff 0%, #2f79e9 100%);
        }
        .navbar ul {
            list-style: none;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .navbar a {
            color: #f2f7ff;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }
        .nav-chip {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            padding: 6px 12px;
        }
        .btn-nav {
            border: 1px solid rgba(255, 255, 255, 0.42);
            background: transparent;
            color: #fff;
            border-radius: 999px;
            padding: 6px 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .container {
            max-width: 1100px;
            margin: 26px auto;
            background: rgba(255, 255, 255, 0.96);
            padding: 24px;
            border-radius: 18px;
            border: 1px solid #e4ecfa;
            box-shadow: 0 16px 35px rgba(24, 52, 96, 0.12);
        }
        .breadcrumb {
            font-size: 13px;
            color: #6b7ea0;
            margin-bottom: 16px;
        }
        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
            align-items: start;
        }
        .photo {
            border: 1px solid #dce5f4;
            border-radius: 16px;
            overflow: hidden;
            background: #f7faff;
            min-height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo img {
            width: 100%;
            height: 100%;
            max-height: 520px;
            object-fit: cover;
        }
        .photo-empty {
            color: #64789b;
            font-weight: 700;
            font-size: 14px;
        }
        .product-card h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 36px;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .meta {
            color: var(--ink-700);
            margin-bottom: 14px;
            font-size: 14px;
        }
        .price {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--price);
            font-size: 36px;
            font-weight: 700;
            margin: 12px 0 18px;
        }
        .buy-box {
            background: linear-gradient(135deg, #f8fbff 0%, #edf3ff 100%);
            border: 1px solid #dbe5f7;
            border-radius: 14px;
            padding: 14px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .buy-box input {
            width: 80px;
            padding: 9px 8px;
            border: 1px solid var(--line);
            border-radius: 10px;
        }
        .btn-cart {
            border: none;
            background: linear-gradient(90deg, var(--teal) 0%, #12a888 100%);
            color: #fff;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-back {
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
            margin-top: 14px;
            display: inline-block;
        }
        @media (max-width: 860px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .photo {
                min-height: 280px;
            }
            .product-card h1 {
                font-size: 30px;
            }
            .price {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="brand"><span class="brand-dot"></span>Shop Board</div>
    <ul>
        <li><a class="nav-chip" th:href="@{/products}">Trang sản phẩm</a></li>
        <li sec:authorize="isAuthenticated()">
            <a class="nav-chip" th:href="@{/cart}">
                Giỏ hàng
                <span th:if="${cartCount != null and cartCount > 0}" style="margin-left:6px;background:rgba(255,255,255,0.3);padding:2px 6px;border-radius:999px;font-size:11px;" th:text="${cartCount}">0</span>
            </a>
        </li>
        <li sec:authorize="isAuthenticated()"><a class="nav-chip" th:href="@{/orders}">Đơn hàng</a></li>
        <li sec:authorize="isAuthenticated()">
            <span>Xin chào, <strong sec:authentication="name">user</strong></span>
        </li>
        <li sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-nav">Đăng xuất</button>
            </form>
        </li>
    </ul>
</nav>

<div class="container">
    <div class="breadcrumb">
        <a th:href="@{/products}">Sản phẩm</a> / <span th:text="${product.name}">Chi tiết</span>
    </div>

    <div class="layout">
        <div class="photo">
            <img th:if="${product.image != null and product.image != ''}" th:src="${product.image}" alt=""/>
            <div class="photo-empty" th:if="${product.image == null or product.image == ''}">Chưa có ảnh sản phẩm</div>
        </div>

        <div class="product-card">
            <h1 th:text="${product.name}">Tên sản phẩm</h1>
            <div class="meta">Danh mục: <strong th:text="${product.category.name}">Danh mục</strong></div>
            <div class="price" th:text="${#numbers.formatDecimal(product.price, 1, 0)} + ' đ'">0 đ</div>

            <form th:action="@{/cart/add}" method="post" class="buy-box">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="productId" th:value="${product.id}"/>
                <label for="quantity">Số lượng</label>
                <input id="quantity" type="number" name="quantity" min="1" value="1"/>
                <button type="submit" class="btn-cart">Thêm vào giỏ</button>
            </form>

            <a th:href="@{/products}" class="btn-back">← Quay lại danh sách sản phẩm</a>
        </div>
    </div>
</div>
</body>
</html>
