<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.id != null} ? 'Edit Product' : 'Create New Product'">Product Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .navbar {
            background-color: #333;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navbar ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }
        
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        
        .container {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        input[type="text"],
        input[type="number"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }

        select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="url"]:focus,
        textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.3s;
        }
        
        .btn-submit {
            background-color: #007bff;
            color: white;
            flex: 1;
        }
        
        .btn-submit:hover {
            background-color: #0056b3;
        }
        
        .btn-cancel {
            background-color: #6c757d;
            color: white;
            flex: 1;
        }
        
        .btn-cancel:hover {
            background-color: #5a6268;
        }
        
        .error {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .required {
            color: #dc3545;
        }
        
        footer {
            text-align: center;
            color: #666;
            margin-top: 30px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div>
            <h1>Products Management</h1>
        </div>
        <ul>
            <li><a href="/products">Home</a></li>
            <li><a href="/products">Products</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <div class="header">
            <h1 th:text="${product.id != null} ? 'Edit Product' : 'Create New Product'">Product Form</h1>
        </div>
        
        <form th:action="${product.id != null} ? @{/products/{id}(id=${product.id})} : @{/products}" 
              method="POST"
              th:object="${product}">
            
            <div class="form-group">
                <label for="name">Product Name <span class="required">*</span></label>
                <input type="text" id="name" th:field="*{name}" placeholder="Enter product name" required>
            </div>
            
            <div class="form-group">
                <label for="price">Price <span class="required">*</span></label>
                <input type="number" id="price" th:field="*{price}" placeholder="Enter product price" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label for="category">Category <span class="required">*</span></label>
                <select id="category" th:field="*{category.id}" required>
                    <option value="">-- Select Category --</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Category</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="image">Image URL</label>
                <input type="url" id="image" th:field="*{image}" placeholder="Enter image URL (optional)">
            </div>
            
            <div class="button-group">
                <button type="submit" class="btn btn-submit" 
                        th:text="${product.id != null} ? 'Update Product' : 'Create Product'">
                    Create Product
                </button>
                <a href="/products" class="btn btn-cancel">Cancel</a>
            </div>
        </form>
        
        <footer>
            © 2025 - Phần mềm quản lý sản phẩm J2EE
        </footer>
    </div>
</body>
</html>
