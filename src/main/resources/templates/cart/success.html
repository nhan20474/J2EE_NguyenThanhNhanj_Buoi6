<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng thành công</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; }
        .navbar {
            background-color: #333; color: white; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar ul { list-style: none; display: flex; gap: 20px; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; }
        .container {
            max-width: 560px; margin: 40px auto; background: white; padding: 28px;
            border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center;
        }
        h1 { color: #28a745; margin-bottom: 16px; font-size: 22px; }
        p { color: #333; margin: 8px 0; line-height: 1.5; }
        .btn {
            display: inline-block; margin-top: 20px; padding: 10px 18px;
            background: #007bff; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div><strong>Shop</strong></div>
    <ul>
        <li><a th:href="@{/products}">Sản phẩm</a></li>
        <li><a th:href="@{/cart}">Giỏ hàng</a></li>
    </ul>
</nav>

<div class="container">
    <h1>Đặt hàng thành công</h1>
    <p th:if="${orderId != null}">Mã đơn: <strong th:text="${orderId}">0</strong></p>
    <p th:if="${orderTotal != null}">
        Tổng tiền: <strong th:text="${#numbers.formatDecimal(orderTotal, 1, 0)} + ' đ'">0</strong>
    </p>
    <p>Cảm ơn bạn đã mua hàng.</p>
    <a class="btn" th:href="@{/products}">Tiếp tục mua sắm</a>
    <a class="btn" style="margin-left:8px;background:#28a745;" th:href="@{/orders}">Xem lịch sử đơn hàng</a>
</div>
</body>
</html>
