<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --bg-soft: #edf5ff;
            --bg-mid: #d9ecff;
            --ink-900: #192a49;
            --ink-600: #5c6e8d;
            --line: #d4dfef;
            --primary: #246bce;
            --primary-dark: #1655ad;
            --ok-bg: #e6f7eb;
            --ok-ink: #1a6f3e;
            --error: #b72020;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background:
                radial-gradient(72rem 40rem at -8% 0%, #f9fbff 0%, transparent 58%),
                radial-gradient(55rem 35rem at 110% 15%, #d9eaff 0%, transparent 60%),
                linear-gradient(135deg, var(--bg-soft) 0%, var(--bg-mid) 52%, #f8fbff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: absolute;
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: rgba(57, 133, 243, 0.16);
            top: -55px;
            right: -45px;
            animation: floaty 7s ease-in-out infinite alternate;
        }
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 18px 42px rgba(29, 63, 113, 0.2);
            padding: 28px 28px 24px;
            border: 1px solid #e7eefb;
            transform: translateY(8px);
            animation: enter 0.6s ease forwards;
        }
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            border-radius: 16px 16px 0 0;
            background: linear-gradient(90deg, #2570d6 0%, #37a1ff 40%, #0b8f72 100%);
        }
        h1 {
            font-size: 30px;
            color: var(--ink-900);
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            color: var(--ink-600);
            margin-bottom: 22px;
            font-size: 14px;
            line-height: 1.5;
        }
        .field { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 13px;
            color: #22395f;
        }
        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input:focus {
            border-color: #5a93ef;
            box-shadow: 0 0 0 4px rgba(58, 123, 226, 0.16);
        }
        .error {
            color: var(--error);
            font-size: 12px;
            margin-top: 5px;
        }
        .alert {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .alert-success {
            background: var(--ok-bg);
            color: var(--ok-ink);
            border: 1px solid #cbead5;
        }
        .btn {
            width: 100%;
            border: none;
            background: linear-gradient(90deg, var(--primary) 0%, #307adf 100%);
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            margin-top: 7px;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }
        .btn:hover {
            background: linear-gradient(90deg, var(--primary-dark) 0%, #246bce 100%);
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(27, 92, 188, 0.27);
        }
        .links {
            margin-top: 17px;
            text-align: center;
            font-size: 13px;
            color: var(--ink-600);
        }
        .links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        @keyframes enter {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes floaty {
            from { transform: translateY(0); }
            to { transform: translateY(16px); }
        }
        @media (max-width: 520px) {
            .card {
                padding: 24px 18px 20px;
                border-radius: 14px;
            }
            h1 { font-size: 27px; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Tạo tài khoản</h1>
    <p class="subtitle">Đăng ký để mua hàng và quản lý giỏ hàng của bạn.</p>

    <div th:if="${success}" class="alert alert-success">
        Đăng ký thành công. Bạn có thể đăng nhập ngay bây giờ.
    </div>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="field">
            <label for="loginName">Tên đăng nhập</label>
            <input id="loginName" type="text" th:field="*{loginName}" placeholder="Ví dụ: nhan20474"/>
            <div class="error" th:if="${#fields.hasErrors('loginName')}" th:errors="*{loginName}"></div>
        </div>

        <div class="field">
            <label for="password">Mật khẩu</label>
            <input id="password" type="password" th:field="*{password}" placeholder="Tối thiểu 6 ký tự"/>
            <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <div class="field">
            <label for="confirmPassword">Nhập lại mật khẩu</label>
            <input id="confirmPassword" type="password" th:field="*{confirmPassword}"/>
            <div class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>

        <button type="submit" class="btn">Đăng ký</button>
    </form>

    <div class="links">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
    </div>
</div>
</body>
</html>
