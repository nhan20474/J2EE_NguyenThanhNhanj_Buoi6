<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --bg-soft: #eef4ff;
            --bg-mid: #d7e7ff;
            --ink-900: #1b2a4a;
            --ink-600: #596a89;
            --line: #d6e0f1;
            --primary: #246bce;
            --primary-dark: #1655ad;
            --accent: #008067;
            --danger-bg: #fce8ea;
            --danger-ink: #8d1d2a;
            --ok-bg: #e7f8ec;
            --ok-ink: #1f6f3f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(70rem 45rem at -10% -10%, #f8fbff 0%, transparent 55%),
                radial-gradient(58rem 40rem at 115% 10%, #dbe8ff 0%, transparent 60%),
                linear-gradient(145deg, var(--bg-soft) 0%, var(--bg-mid) 48%, #f8fbff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(2px);
            animation: drift 8s ease-in-out infinite alternate;
        }
        body::before {
            width: 240px;
            height: 240px;
            background: rgba(43, 116, 228, 0.16);
            top: -60px;
            left: -70px;
        }
        body::after {
            width: 190px;
            height: 190px;
            background: rgba(0, 126, 104, 0.15);
            bottom: -50px;
            right: -45px;
            animation-delay: 0.7s;
        }
        .panel {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(34, 64, 112, 0.2);
            padding: 28px 28px 24px;
            border: 1px solid #e8effb;
            transform: translateY(8px);
            animation: enter 0.6s ease forwards;
        }
        .panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary) 0%, #38a3ff 45%, var(--accent) 100%);
            border-radius: 16px 16px 0 0;
        }
        h1 {
            color: var(--ink-900);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 30px;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 14px;
            color: var(--ink-600);
            margin-bottom: 22px;
            line-height: 1.5;
        }
        .field { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            color: #24395e;
            font-size: 13px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input:focus {
            border-color: #5a93ef;
            box-shadow: 0 0 0 4px rgba(58, 123, 226, 0.16);
        }
        .alert {
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .alert-error {
            color: var(--danger-ink);
            background: var(--danger-bg);
            border: 1px solid #f5c5cb;
        }
        .alert-ok {
            color: var(--ok-ink);
            background: var(--ok-bg);
            border: 1px solid #cbead5;
        }
        .btn-login {
            width: 100%;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--primary) 0%, #307adf 100%);
            color: #fff;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }
        .btn-login:hover {
            background: linear-gradient(90deg, var(--primary-dark) 0%, #246bce 100%);
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(27, 92, 188, 0.28);
        }
        .register-block {
            margin-top: 16px;
            text-align: center;
            border-top: 1px solid #ebf0f8;
            padding-top: 15px;
            color: var(--ink-600);
            font-size: 13px;
        }
        .btn-register {
            margin-top: 10px;
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(90deg, var(--accent) 0%, #0a9a7c 100%);
            color: #fff;
            font-weight: 700;
            padding: 10px 16px;
            border-radius: 10px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn-register:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(8, 133, 107, 0.26);
        }
        @keyframes drift {
            from { transform: translateY(0); }
            to { transform: translateY(18px); }
        }
        @keyframes enter {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 520px) {
            .panel {
                padding: 24px 18px 20px;
                border-radius: 14px;
            }
            h1 { font-size: 27px; }
        }
    </style>
</head>
<body>
<div class="panel">
    <h1>Đăng nhập</h1>
    <p class="subtitle">Đăng nhập để xem sản phẩm và quản lý giỏ hàng của bạn.</p>

    <div th:if="${hasError}" class="alert alert-error">
        Sai tên đăng nhập hoặc mật khẩu.
    </div>
    <div th:if="${hasLogout}" class="alert alert-ok">
        Bạn đã đăng xuất thành công.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="field">
            <label for="username">Tên đăng nhập</label>
            <input id="username" name="username" type="text" required>
        </div>

        <div class="field">
            <label for="password">Mật khẩu</label>
            <input id="password" name="password" type="password" required>
        </div>

        <button type="submit" class="btn-login">Đăng nhập</button>
    </form>

    <div class="register-block">
        Chưa có tài khoản?
        <br>
        <a class="btn-register" th:href="@{/register}">Đăng ký ngay</a>
    </div>
</div>
</body>
</html>
