<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh mục</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --bg-1: #eef5ff;
            --bg-2: #dbe9ff;
            --ink-900: #172845;
            --ink-700: #3d5276;
            --line: #d6e0f0;
            --primary: #236bd0;
            --primary-dark: #1858b0;
            --teal: #0c8d71;
            --danger: #cc3f4e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background:
                radial-gradient(72rem 48rem at -8% 0%, #f8fbff 0%, transparent 55%),
                radial-gradient(65rem 42rem at 108% 10%, #dce9ff 0%, transparent 58%),
                linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 48%, #f8fbff 100%);
            color: var(--ink-900);
            min-height: 100vh;
        }
        .navbar {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(7px);
            background: rgba(16, 36, 68, 0.88);
            color: white;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }
        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            letter-spacing: -0.02em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar a {
            color: #f2f7ff;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }
        .nav-chip {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            padding: 6px 12px;
        }
        .container {
            max-width: 1000px;
            margin: 26px auto;
            background: rgba(255, 255, 255, 0.96);
            padding: 24px;
            border-radius: 18px;
            border: 1px solid #e4ecfa;
            box-shadow: 0 16px 35px rgba(24, 52, 96, 0.12);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            letter-spacing: -0.02em;
        }
        .btn-create {
            background: linear-gradient(90deg, var(--teal) 0%, #0aa98a 100%);
            color: white;
            padding: 10px 16px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            box-shadow: 0 8px 16px rgba(9, 141, 113, 0.25);
        }
        .table-wrap {
            border: 1px solid #e2eaf8;
            border-radius: 14px;
            overflow: auto;
            background: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #edf2fb;
            font-size: 14px;
            vertical-align: middle;
        }
        th {
            background-color: #f8fbff;
            font-weight: 700;
            color: var(--ink-700);
            font-size: 12px;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        tr:hover { background-color: #f8fbff; }
        .btn-edit, .btn-delete {
            display: inline-block;
            padding: 7px 11px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 12px;
            margin-right: 6px;
            color: white;
            font-weight: 700;
        }
        .btn-edit { background-color: #16a368; }
        .btn-delete { background-color: var(--danger); }
        .alert {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid transparent;
            font-size: 14px;
        }
        .alert-success {
            background: #e7f8ec;
            color: #1a6f3e;
            border-color: #cbead5;
        }
        .alert-error {
            background: #fdebec;
            color: #9f2430;
            border-color: #f4c8cd;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--ink-700);
        }
        footer {
            text-align: center;
            color: var(--ink-700);
            margin-top: 24px;
            padding: 14px;
            border-top: 1px solid #e2e9f6;
            font-size: 13px;
        }
        @media (max-width: 600px) {
            .container {
                margin: 16px 10px;
                padding: 14px;
            }
            .header h1 {
                font-size: 27px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="brand">Quản lý danh mục</div>
    <a class="nav-chip" th:href="@{/products}">← Trở lại sản phẩm</a>
</nav>

<div class="container">
    <div class="header">
        <h1>📋 Danh sách danh mục</h1>
        <a th:href="@{/admin/categories/add}" class="btn-create">+ Thêm danh mục</a>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <div class="table-wrap" th:if="${categories != null and categories.size() > 0}">
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Tên danh mục</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="category, iterStat : ${categories}">
                <td th:text="${iterStat.count}">1</td>
                <td th:text="${category.name}">Tên danh mục</td>
                <td>
                    <a th:href="@{/admin/categories/{id}/edit(id=${category.id})}" class="btn-edit">Sửa</a>
                    <a th:href="@{/admin/categories/{id}/delete(id=${category.id})}" class="btn-delete"
                       onclick="return confirm('Xóa danh mục này?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="empty-state" th:if="${categories == null or categories.size() == 0}">
        <p>Chưa có danh mục nào. <a th:href="@{/admin/categories/add}">Thêm danh mục đầu tiên</a></p>
    </div>

    <footer>
        © 2026 — Quản lý &amp; mua sắm sản phẩm (J2EE / Spring Boot)
    </footer>
</div>
</body>
</html>
